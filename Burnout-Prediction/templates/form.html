<!DOCTYPE html>
<html>
<head>
    <title>Burnout Form</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
        }

        .container {
            background: white;
            width: 400px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: white;
            margin-top: 30px;
        }

        h3 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5a67d8;
        }

        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h2>🔥 Burnout Prediction System</h2>

    <div class="container">
        <h3>Enter Your Details</h3>

        <form action="/predict" method="POST">

            Sleep Hours:
            <input type="number" step="0.1" name="sleep" required>

            Work Hours:
            <input type="number" step="0.1" name="work" required>

            Screen Time (hrs):
            <input type="number" step="0.1" name="screen" required>

            Stress Level (1-10):
            <input type="number" name="stress" required>

            Physical Activity (hrs):
            <input type="number" step="0.1" name="activity" required>

            Social Interaction (hrs):
            <input type="number" step="0.1" name="social" required>

            Caffeine Intake (cups):
            <input type="number" step="0.1" name="caffeine" required>

            <button type="submit">Predict Burnout</button>

        </form>
    </div>

    <br>
    <a href="/">⬅ Back to Home</a>

</body>
</html>
