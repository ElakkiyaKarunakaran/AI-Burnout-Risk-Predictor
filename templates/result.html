<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            text-align: center;
        }

        h2 {
            color: white;
            margin-top: 40px;
        }

        .result-box {
            background: white;
            width: 400px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .score {
            font-size: 20px;
            margin-top: 10px;
            font-weight: bold;
        }

        .high {
            color: red;
        }

        .moderate {
            color: orange;
        }

        .low {
            color: green;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background-color: #ff5e62;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        a:hover {
            background-color: #e04e52;
        }
    </style>
</head>

<body>

    <h2>🔥 Burnout Prediction Result</h2>

    <div class="result-box">

        {% if "High" in result %}
            <h3 class="high">{{ result }}</h3>
        {% elif "Moderate" in result %}
            <h3 class="moderate">{{ result }}</h3>
        {% else %}
            <h3 class="low">{{ result }}</h3>
        {% endif %}

        <div class="score">
            Burnout Score: {{ score }}
        </div>

        <br>
        <a href="/form">🔁 Check Again</a>

    </div>

</body>
</html>
